<!doctype html>
<html lang="te">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padyaalu — myflare</title>
<style>
  :root {
    color-scheme: light dark;
    --page: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --border: rgba(11,11,11,0.10); --accent: #a6641b;
    --chip: rgba(11,11,11,0.04); --padyam-bg: rgba(166,100,27,0.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
      --muted: #898781; --border: rgba(255,255,255,0.10); --accent: #e0a35c;
      --chip: rgba(255,255,255,0.06); --padyam-bg: rgba(224,163,92,0.07);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink);
    display: flex; flex-direction: column; min-height: 100vh;
  }
  /* Telugu-capable serif for the verse itself */
  .telugu-serif {
    font-family: "Noto Serif Telugu", "Ramaraja", "Gautami", "Pothana2000",
                 "Mandali", Georgia, serif;
  }

  /* ---- top bar ---- */
  .topbar {
    position: sticky; top: 0; z-index: 5;
    background: color-mix(in srgb, var(--page) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem 1.25rem;
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem 1rem;
  }
  .brand { display: flex; align-items: baseline; gap: 0.55rem; margin-right: auto; }
  .brand a { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  .brand a:hover { color: var(--accent); }
  .brand strong { font-size: 1.05rem; letter-spacing: -0.01em; }
  .brand .te { color: var(--ink-2); font-size: 0.95rem; }
  .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .chip {
    border: 1px solid var(--border); background: var(--chip);
    color: var(--ink-2); border-radius: 999px;
    padding: 0.28rem 0.8rem; font-size: 0.82rem; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .chip:hover { border-color: var(--accent); color: var(--ink); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: var(--padyam-bg); font-weight: 600; }

  /* ---- card stage ---- */
  .stage {
    flex: 1; display: flex; align-items: stretch; justify-content: center;
    padding: 1.5rem 1.25rem 1rem;
  }
  .card {
    width: 100%; max-width: 680px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 2rem clamp(1.25rem, 5vw, 2.75rem) 2.25rem;
    display: flex; flex-direction: column;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.05);
  }
  .card-head {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 0.75rem;
    color: var(--muted); font-size: 0.8rem; margin-bottom: 1.5rem;
  }
  .badge {
    color: var(--accent); border: 1px solid var(--accent);
    border-radius: 999px; padding: 0.15rem 0.65rem; font-weight: 600;
  }
  .card-head .meter { margin-left: auto; }

  .padyam {
    background: var(--padyam-bg); border-radius: 14px;
    padding: 1.6rem 1.25rem; text-align: center;
    display: grid; gap: 0.45rem;
    font-size: clamp(1.15rem, 3.6vw, 1.55rem); line-height: 1.75;
  }
  .padyam .line { font-weight: 500; }
  .padyam .line:last-child { color: var(--accent); margin-top: 0.3rem; }

  section.block { margin-top: 1.75rem; }
  section.block > h3 {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 0.75rem;
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  section.block > h3 .te { text-transform: none; letter-spacing: 0; color: var(--ink-2); font-size: 0.95rem; }

  .gloss { display: grid; gap: 0.1rem; }
  .gloss .row {
    display: grid; grid-template-columns: minmax(9rem, 38%) 1fr; gap: 0.75rem;
    padding: 0.5rem 0.2rem; border-bottom: 1px solid var(--border);
  }
  .gloss .row:last-child { border-bottom: 0; }
  .gloss .w { font-size: 1.02rem; }
  .gloss .m { color: var(--ink-2); font-size: 0.92rem; align-self: center; }

  .tatparyam { color: var(--ink-2); line-height: 1.65; font-size: 0.98rem; }

  .chandassu.todo {
    color: var(--muted); font-size: 0.9rem; line-height: 1.6;
    border: 1px dashed var(--border); border-radius: 12px; padding: 0.9rem 1rem;
  }
  .chandassu.todo b { color: var(--ink-2); font-weight: 600; }

  /* ---- nav ---- */
  .nav {
    position: sticky; bottom: 0;
    background: color-mix(in srgb, var(--page) 88%, transparent);
    backdrop-filter: blur(8px); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    padding: 0.75rem 1.25rem;
  }
  .nav button {
    font: inherit; cursor: pointer; color: var(--ink);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.5rem 1.1rem;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .nav button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav button:disabled { opacity: 0.4; cursor: default; }
  .counter { color: var(--muted); font-size: 0.85rem; min-width: 5.5rem; text-align: center; }

  .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <a href="../index.html">← myflare</a>
      <strong>Padyaalu</strong>
      <span class="te telugu-serif">పద్యాలు</span>
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <main class="stage">
    <article class="card" id="card"><!-- rendered --></article>
  </main>

  <div class="nav">
    <button id="prev">← ముందు</button>
    <span class="counter" id="counter">0 / 0</span>
    <button id="next">తరువాత →</button>
  </div>

  <script src="data/poems.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let filter = "all";
    let idx = 0;

    function visiblePoems() {
      return filter === "all" ? POEMS : POEMS.filter((p) => p.satakam === filter);
    }

    function renderFilters() {
      const counts = {};
      POEMS.forEach((p) => (counts[p.satakam] = (counts[p.satakam] || 0) + 1));
      const tabs = [{ key: "all", label: "All", n: POEMS.length }].concat(
        Object.keys(SATAKAMS)
          .filter((k) => counts[k])
          .map((k) => ({ key: k, label: SATAKAMS[k].short, n: counts[k] }))
      );
      $("filters").innerHTML = tabs
        .map(
          (t) =>
            `<button class="chip${t.key === filter ? " active" : ""}" data-key="${t.key}">` +
            `${t.label} <span style="opacity:.6">${t.n}</span></button>`
        )
        .join("");
      $("filters").querySelectorAll(".chip").forEach((b) =>
        b.addEventListener("click", () => {
          filter = b.dataset.key;
          idx = 0;
          renderFilters();
          renderCard();
        })
      );
    }

    function esc(s) {
      return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    function renderCard() {
      const poems = visiblePoems();
      const card = $("card");
      if (!poems.length) {
        card.innerHTML = `<p class="empty">No poems yet for this śatakam.</p>`;
        $("counter").textContent = "0 / 0";
        $("prev").disabled = $("next").disabled = true;
        return;
      }
      idx = Math.max(0, Math.min(idx, poems.length - 1));
      const p = poems[idx];
      const s = SATAKAMS[p.satakam];

      const lines = p.lines.map((l) => `<div class="line telugu-serif">${esc(l)}</div>`).join("");
      const gloss = p.pratipadartham
        .map(
          (g) =>
            `<div class="row"><div class="w telugu-serif">${esc(g.word)}</div>` +
            `<div class="m">${esc(g.meaning)}</div></div>`
        )
        .join("");

      const chandassu = p.chandassu
        ? `<div class="chandassu">${esc(p.chandassu)}</div>`
        : `<div class="chandassu todo">Meter: <b>${esc(p.meter)}</b>. ` +
          `Full gaṇa-by-gaṇa breakdown (laghu/guru scansion) coming in phase 2.</div>`;

      card.innerHTML =
        `<div class="card-head">` +
          `<span class="badge">${esc(s.short)}</span>` +
          `<span>${esc(s.name)} · ${esc(s.poet)}</span>` +
          `<span class="meter">ఛందస్సు: ${esc(p.meter)}</span>` +
        `</div>` +
        `<div class="padyam">${lines}</div>` +
        `<section class="block"><h3>Prati padārtham <span class="te telugu-serif">ప్రతిపదార్థం</span></h3>` +
          `<div class="gloss">${gloss}</div></section>` +
        `<section class="block"><h3>Tātparyam <span class="te telugu-serif">తాత్పర్యం</span></h3>` +
          `<p class="tatparyam">${esc(p.tatparyam)}</p></section>` +
        `<section class="block"><h3>Chandassu <span class="te telugu-serif">ఛందస్సు</span></h3>` +
          chandassu + `</section>`;

      $("counter").textContent = `${idx + 1} / ${poems.length}`;
      $("prev").disabled = idx === 0;
      $("next").disabled = idx === poems.length - 1;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function go(delta) {
      const n = visiblePoems().length;
      if (!n) return;
      idx = Math.max(0, Math.min(idx + delta, n - 1));
      renderCard();
    }

    $("prev").addEventListener("click", () => go(-1));
    $("next").addEventListener("click", () => go(1));
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") go(-1);
      else if (e.key === "ArrowRight") go(1);
    });

    renderFilters();
    renderCard();
  </script>
</body>
</html>
